apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: self-service-portal
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Madhu1217/ssp-gitops.git
    targetRevision: main
    path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
